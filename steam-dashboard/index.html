<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Steam Dashboard</title>

  
</head>
<body>
  <header>
    <h1>Steam Dashboard</h1>
    <div class="search-bar">
      <input type="text" id="app-id-input" placeholder="Enter App ID (e.g 730)" />
      <button id="search-button">Search</button>
    </div>
  </header>

  <main id="results" style="display: none;">

    <section class="stats-row">
      <div class="stat-card">
        <p>Current Players</p>
        <p id="current-players">-</p>
      </div>
      <div class="stat-card">
        <p>Price</p>
        <p id="price">-</p>
      </div>
      <div class="stat-card">
        <h2>Peak Players (All Time)</h2>
        <p id="all-time-peak">-</p>
      </div>
    </section>

    <section class="game-info">
      <h2 id="game-title">Game Title</h2>
      <p id="game-description">Game description will appear here.</p>
      <div id="genres"></div>
    </section>
  </main>
    <p id="error-msg" style="display: none; color: red;"></p>

  <script>
    const searchButton = document.getElementById('search-button');
    let currentAppId = '';
    searchButton.addEventListener('click', () => {
      const input = document.getElementById('app-id-input');
      const appId = input.value.trim();
      
      if(!appId) {
        alert('Please enter a valid App ID.');
        return;
      }

      console.log(`Searching for App ID: `, appId);
    });

  const PROXY = 'https://steam-proxy-server.itsgearofroad.workers.dev/?url='

async function fetchAppDetails(appId) {
  const steamUrl = `https://store.steampowered.com/api/appdetails?appids=${appId}`
  const res = await fetch(PROXY + encodeURIComponent(steamUrl))
  const json = await res.json()
  
  if (!json[appId]?.success) {
    throw new Error('Game not found or API unavailable')
  }
  
  return json[appId].data
}
async function handleSearch() {
  const appId = document.getElementById('app-id-input').value.trim()
  if (!appId) return

  try {
    const game = await fetchAppDetails(appId)
    
    document.getElementById('game-title').textContent = game.name
    document.getElementById('game-description').textContent = game.short_description
    document.getElementById('price').textContent = 
      game.is_free ? 'Free' : (game.price_overview?.final_formatted ?? 'N/A')
    document.getElementById('review-score').textContent = game.review_score_desc
    
    // Show the results section
    document.getElementById('results').style.display = 'block'
  } catch (err) {
    document.getElementById('error-msg').textContent = err.message
    document.getElementById('error-msg').style.display = 'block'
  }
